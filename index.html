<html lang="zh-CN">

    <title>遇事不决摇一卦</title>

            --jade-deep: #11543f;

            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            background: var(--paper);
        }

            overflow-x: hidden;

            color: var(--ink);
            min-height: 100vh;
            padding: 28px 18px 44px;
        }
        
        .card {
            width: min(100%, 980px);
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(2rem, 7vw, 4.25rem);
            line-height: 1.05;
            margin-bottom: 14px;
            letter-spacing: 0;
        }

            background-repeat: no-repeat;
            background-size: auto, min(44%, 360px);
            box-shadow: var(--shadow);
        }

            position: relative;
            z-index: 1;
            max-width: 610px;
        }

            min-height: 0;
            padding: 22px 24px;
            background-position: center, right -120px center;
            background-size: auto, 260px;
        }

        }

            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 13px 22px;
            margin-top: 14px;
            border: none;
            border-radius: 8px;
            background: var(--jade);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(31, 122, 91, 0.22);

            transform: translateY(-2px);
            background: var(--jade-deep);
            box-shadow: 0 14px 28px rgba(31, 122, 91, 0.26);
        }

        button:active {
            transform: translateY(0);
        }

            margin-bottom: 22px;
            background: var(--ink);
            box-shadow: 0 10px 22px rgba(23, 35, 29, 0.18);

            display: none;
        }

            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            color: var(--ink);
            font-size: 1rem;
            line-height: 1.4;

        }

            border-color: rgba(31, 122, 91, 0.85);
            box-shadow: 0 0 0 3px rgba(31, 122, 91, 0.14);

            resize: vertical;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfdfb;
            color: var(--ink);
            font: inherit;
            line-height: 1.6;

            justify-content: center;
            margin-top: 12px;
            padding: 12px 18px;
            border-radius: 8px;
            background: var(--ink);
            color: #ffffff;
            font-weight: 700;

            transform: translateY(-2px);
            background: var(--jade-deep);
        }

            margin-top: 22px;
            display: grid;
            gap: 16px;

            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px 20px;
            line-height: 1.7;
            box-shadow: 0 10px 28px rgba(23, 35, 29, 0.07);
        }

        .info-item strong {
            display: block;
            margin-bottom: 8px;
            color: var(--jade-deep);
        }

        .section-title {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            margin-top: 14px;
            padding: 6px 12px;
            border: 1px solid rgba(31, 122, 91, 0.18);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.76);
            color: var(--ink);
            font-size: 1.5rem;
            line-height: 1.2;
            box-shadow: 0 8px 20px rgba(23, 35, 29, 0.06);
        }

        .line-block {
            margin-top: 12px;
            padding: 14px;
            background: #f8fbf8;
            border: 1px solid #e6eee8;
            border-radius: 8px;
        }

        .line-block span {
            display: block;
            margin-bottom: 4px;
        }

        .changing-line {
            color: var(--red);
        }

        .gua-xiang {
            display: grid;
            gap: 9px;
            justify-items: center;
            width: fit-content;
            margin: 16px auto 4px;
            padding: 16px 22px;
            border: 1px solid #e1ebe5;
            border-radius: 8px;
            background: #f9fcf9;
        }

        .gua-line {
            display: flex;
            justify-content: space-between;
            width: 172px;
            height: 13px;
        }

        .gua-segment {
            display: block;
            height: 100%;
            background: var(--ink);
            border-radius: 3px;
            box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.16);

            width: 72px;
        }

        .muted {
            color: var(--muted-ink);
            font-size: 0.95rem;
        }

            body {

            }

                min-height: 0;
                padding: 24px 18px;
                background-size: auto, 220px;
                background-position: center, right -68px top 18px;
            }

            button,
            .deepseek-link {
                width: 100%;
            }

            .gua-line {
                width: 148px;
                height: 12px;
            }

            .gua-line.broken .gua-segment {
                width: 62px;
            }
        }
    </style>
</head>

        "lines": [
          {
            "position": "初九",
            "text": "有厉，利已。",
            "xiang_text": "有厉利已，不犯灾也。"
          },
          {
            "position": "九二",
            "text": "舆说辐。",
            "xiang_text": "舆说辐，中无尤也。"
          },
          {
            "position": "九三",
            "text": "良马逐，利艰贞。曰闲舆卫，利有攸往。",
            "xiang_text": "利有攸往，上合志也。"
          },
          {
            "position": "六四",
            "text": "童牛之牿，元吉。",
            "xiang_text": "六四元吉，有喜也。"
          },
          {
            "position": "六五",
            "text": "豶豕之牙，吉。",
            "xiang_text": "六五之吉，有庆也。"
          },
          {
            "position": "上九",
            "text": "何天之衢，亨。",
            "xiang_text": "何天之衢，道大行也。"
          }
        ]
      },
      "101000": {
        "number": 35,
        "title": "晋卦 火地晋 离上坤下",
        "gua_xiang": "———\n— —\n———\n— —\n— —\n— —",
        "definition": "晋：康侯用锡马蕃庶，昼日三接。",
        "tuan": "晋，进也。明出地上，顺而丽乎大明。柔进而上行，是以康侯用锡马蕃庶，昼日 三接也。",
        "xiang": "明出地上，晋。君子以自昭明德。",
        "lines": [
          {
            "position": "初六",
            "text": "晋如，摧如，贞吉。罔孚，裕无咎。",
            "xiang_text": "晋如摧如，独行正也。裕无咎，未受命也。"
          },
          {
            "position": "六二",
            "text": "晋如，愁如，贞吉。受兹介福，于其王母。",
            "xiang_text": "受兹介福，以中正也。"
          },
          {
            "position": "六三",
            "text": "众允，悔亡。",
            "xiang_text": "众允之志，上行也。"
          },
          {
            "position": "九四",
            "text": "晋如硕鼠，贞厉。",
            "xiang_text": "硕鼠贞厉，位不当也。"
          },
          {
            "position": "六五",
            "text": "悔亡，失得勿恤，往吉，无不利。",
            "xiang_text": "失得勿恤，往有庆也。"
          },
          {
            "position": "上九",
            "text": "晋其角，维用伐邑。厉吉无咎，贞吝。",
            "xiang_text": "维用伐邑，道未光也。"
          }
        ]
      },
      "101001": {
        "number": 21,
        "title": "噬嗑卦 火雷噬嗑 离上震下",
        "gua_xiang": "———\n— —\n———\n— —\n— —\n———",
        "definition": "噬嗑：亨。利用狱。",
        "tuan": "颐中有物曰噬嗑。噬嗑而亨，刚柔分，动而明，雷电合而章。柔得中而上行， 虽不当位，利用狱也。",
        "xiang": "雷电噬嗑。先王以明罚敕法。",
        "lines": [
          {
            "position": "初九",
            "text": "履校灭趾，无咎。",
            "xiang_text": "履校灭趾，不行也。"
          },
          {
            "position": "六二",
            "text": "噬肤灭鼻，无咎。",
            "xiang_text": "噬肤灭鼻，乘刚也。"
          },
          {
            "position": "六三",
            "text": "噬腊肉，遇毒。小吝，无咎。",
            "xiang_text": "遇毒，位不当也。"
          },
          {
            "position": "九四",
            "text": "噬干胏，得金矢。利艰贞，吉。",
            "xiang_text": "利艰贞吉，未光也。"
          },
          {
            "position": "六五",
            "text": "噬干肉，得黄金。贞厉，无咎。",
            "xiang_text": "贞厉无咎，得当也。"
          },
          {
            "position": "上九",
            "text": "何校灭耳，凶。",
            "xiang_text": "何校灭耳，聪不明也。"
          }
        ]
      },
      "101010": {
        "number": 64,
        "title": "未济卦 火水未济 离上坎下",
        "gua_xiang": "———\n— —\n———\n— —\n———\n— —",
        "definition": "未济：亨。小狐汔济，濡其尾，无攸利。",
        "tuan": "未济，亨；柔得中也。小狐汔济，未出中也。濡其尾，无攸利；不续终也。虽不 当位，刚柔应也。",
        "xiang": "火在水上，未济。君子以慎辨物居方。",
        "lines": [
          {
            "position": "初六",
            "text": "濡其尾，吝。",
            "xiang_text": "濡其尾，亦不知极也。"
          },
          {
            "position": "九二",
            "text": "曳其轮，贞吉。",
            "xiang_text": "九二贞吉，中以行正也。"
          },
          {
            "position": "六三",
            "text": "未济，征凶，利涉大川。",
            "xiang_text": "未济征凶，位不当也。"
          },
          {
            "position": "九四",
            "text": "贞吉，悔亡，震用伐鬼方。三年有赏于大国。",
            "xiang_text": "贞吉悔亡，志行也。"
          },
          {
            "position": "六五",
            "text": "贞吉，无悔。君子之光，有孚，吉。",
            "xiang_text": "君子之光，其晖吉也。"
          },
          {
            "position": "上九",
            "text": "有孚于饮酒，无咎。濡其首，有孚失是。",
            "xiang_text": "饮酒濡首，亦不知节也。"
          }
        ]
      },
      "101011": {
        "number": 38,
        "title": "睽卦 火泽睽 离上兑下",
        "gua_xiang": "———\n— —\n———\n— —\n———\n———",
        "definition": "睽：小事吉。",
        "tuan": "睽，火动而上，泽动而下。二女同居，其志不同行；说而丽乎明，柔进而上行， 得中而应乎刚。是以小事吉。天地睽而其事同也，男女睽而其志通也，万物睽而其事类也。睽之时用大矣哉！",
        "xiang": "上火下泽，睽。君子以同而异。",
        "lines": [
          {
            "position": "初九",
            "text": "悔亡，丧马勿逐，自复。见恶人，无咎。",
            "xiang_text": "见恶人，以辟咎也。"
          },
          {
            "position": "九二",
            "text": "遇主于巷，无咎。",
            "xiang_text": "遇主于巷，未失道也。"
          },
          {
            "position": "六三",
            "text": "见舆曳，其牛掣，其人天且劓，无初有终。",
            "xiang_text": "见舆曳，位不当也。无初有终，遇刚也。"
          },
          {
            "position": "九四",
            "text": "睽孤，遇元夫。交孚，厉无咎。",
            "xiang_text": "交孚无咎，志行也。"
          },
          {
            "position": "六五",
            "text": "悔亡，厥宗噬肤，往何咎？",
            "xiang_text": "厥宗噬肤，往有庆也。"
          },
          {
            "position": "上九",
            "text": "睽孤，见豕负涂，载鬼一车。先张之弧，后说之弧。匪寇婚媾，往遇雨则吉。",
            "xiang_text": "遇雨之吉，群疑亡也。"
          }
        ]
      },
      "101100": {
        "number": 56,
        "title": "旅卦 火山旅 离上艮下",
        "gua_xiang": "———\n— —\n———\n———\n— —\n— —",
        "definition": "旅：小亨，旅贞吉。",
        "tuan": "旅，小亨。柔得中乎外，而顺乎刚，止而丽乎明，是以小亨，旅贞吉也。旅之时 义大矣哉！",
        "xiang": "山上有火，旅。君子以明慎用刑而不留狱。",
        "lines": [
          {
            "position": "初六",
            "text": "旅琐琐，斯其所取灾。",
            "xiang_text": "旅琐琐，志穷灾也。"
          },
          {
            "position": "六二",
            "text": "旅即次，怀其资，得童仆，贞。",
            "xiang_text": "得童仆贞，终无尤也。"
          },
          {
            "position": "九三",
            "text": "旅焚其次，丧其童仆，贞厉。",
            "xiang_text": "旅焚其次，亦以伤矣。以旅与下，其义丧也。"
          },
          {
            "position": "九四",
            "text": "旅于处，得其资斧，我心不快。",
            "xiang_text": "旅于处，未得位也。得其资斧，心未快也。"
          },
          {
            "position": "六五",
            "text": "射雉，一矢亡，终以誉命。",
            "xiang_text": "终以誉命，上逮也。"
          },
          {
            "position": "上九",
            "text": "鸟焚其巢，旅人先笑后号咷。丧牛于易，凶。",
            "xiang_text": "以旅在上，其义焚也。丧牛于易，终莫之闻也。"
          }
        ]
      },
      "101101": {
        "number": 30,
        "title": "离卦 离为火 离上离下",
        "gua_xiang": "———\n— —\n———\n———\n— —\n———",
        "definition": "离：利贞，亨。畜牝牛，吉。",
        "tuan": "离，丽也。日月丽乎天，百谷草木丽乎土。重明以丽乎正，乃化成天下。柔丽乎 中正，故亨，是以畜牝牛吉也。",
        "xiang": "明两作，离。大人以继明照于四方。",
        "lines": [
          {
            "position": "初九",
            "text": "履错然，敬之无咎。",
            "xiang_text": "履错之敬， 以辟咎也。"
          },
          {
            "position": "六二",
            "text": "黄离，元吉。",
            "xiang_text": "黄离元吉，得中道也。"
          },
          {
            "position": "九三",
            "text": "日昃之离，不鼓缶而歌，则大耋之嗟，凶。",
            "xiang_text": "日昃之离，何可久也。"
          },
          {
            "position": "九四",
            "text": "突如其来如，焚如，死如，弃如。",
            "xiang_text": "突如其来如，无所容也。"
          },
          {
            "position": "六五",
            "text": "出涕沱若，戚嗟若，吉。",
            "xiang_text": "六五之吉，离王公也。"
          },
          {
            "position": "上九",
            "text": "王用出征，有嘉。折首，获其匪丑，无咎。",
            "xiang_text": "王用出征，以正邦也。"
          }
        ]
      },
      "101110": {
        "number": 50,
        "title": "鼎卦 火风鼎 离上巽下",
        "gua_xiang": "———\n— —\n———\n———\n———\n— —",
        "definition": "鼎：元吉，亨。",
        "tuan": "鼎，象也。以木巽火，亨饪也。圣人亨以享上帝，而大亨以养圣贤。巽而耳目聪 明，柔进而上行，得中而应乎刚，是以元亨。",
        "xiang": "木上有火，鼎。君子以正位凝命。",
        "lines": [
          {
            "position": "初六",
            "text": "鼎颠趾，利出否。得妾以其子，无咎。",
            "xiang_text": "鼎颠趾，未悖也。利出否，以从贵也。"
          },
          {
            "position": "九二",
            "text": "鼎有实，我仇有疾，不我能即，吉。",
            "xiang_text": "鼎有实，慎所之也。我仇有疾，终无尤也。"
          },
          {
            "position": "九三",
            "text": "鼎耳革，其行塞，雉膏不食。方雨，亏悔，终吉。",
            "xiang_text": "鼎耳革，失其义也。"
          },
          {
            "position": "九四",
            "text": "鼎折足，覆公餗，其形渥，凶。",
            "xiang_text": "覆公餗，信如何也？"
          },
          {
            "position": "六五",
            "text": "鼎黄耳金铉，利贞。",
            "xiang_text": "鼎黄耳，中以为实也。"
          },
          {
            "position": "上九",
            "text": "鼎玉铉，大吉，无不利。",
            "xiang_text": "玉铉在上，刚柔节也。"
          }
        ]
      },
      "101111": {
        "number": 14,
        "title": "大有卦 火天大有 离上乾下",
        "gua_xiang": "———\n— —\n———\n———\n———\n———",
        "definition": "大有：元亨。",
        "tuan": "大有，柔得尊位，大中而上下应之，曰大有。其德刚健而文明，应乎天而时行，是以元亨。",
        "xiang": "火在天上，大有。君子以遏恶扬善，顺天休命。",
        "lines": [
          {
            "position": "初九",
            "text": "无交害，匪咎，艰则无咎。",
            "xiang_text": "大有初九，无交害也。"
          },
          {
            "position": "九二",
            "text": "大车以载，有攸往，无咎。",
            "xiang_text": "大车以载，积中不败也。"
          },
          {
            "position": "九三",
            "text": "公用亨于天子，小人弗克。",
            "xiang_text": "公用亨于天子，小人害也。"
          },
          {
            "position": "九四",
            "text": "匪其彭，无咎。",
            "xiang_text": "匪其彭，无咎，明辨晰也。"
          },
          {
            "position": "六五",
            "text": "厥孚交如，威如，吉。",
            "xiang_text": "厥孚交如，信以发志也。威如之吉，易而无备也。"
          },
          {
            "position": "上九",
            "text": "自天佑之，吉无不利。",
            "xiang_text": "大有上吉，自天佑也。"
          }
        ]
      },
      "110000": {
        "number": 20,
        "title": "观卦 风地观 巽上坤下",
        "gua_xiang": "———\n———\n— —\n— —\n— —\n— —",
        "definition": "观：盥而不荐，有孚颙若。",
        "tuan": "大观在上，顺而巽，中正以观天下，观。盥而不荐，有孚颙若，下观而化也。观 天之神道，而四时不忒。圣人以神道设教，而天下服矣。",
        "xiang": "风行地上，观。先王以省方观民设教",
        "lines": [
          {
            "position": "初六",
            "text": "童观，小人无咎，君子吝。",
            "xiang_text": "初六童观，小人道也。"
          },
          {
            "position": "六二",
            "text": "窥观，利女贞。",
            "xiang_text": "窥观女贞，亦可丑也。"
          },
          {
            "position": "六三",
            "text": "观我生，进退。",
            "xiang_text": "观我生进退，未失道也。"
          },
          {
            "position": "六四",
            "text": "观国之光，利用宾于王。",
            "xiang_text": "观国之光，尚宾也。"
          },
          {
            "position": "九五",
            "text": "观我生，君子无咎。",
            "xiang_text": "观我生，观民也。"
          },
          {
            "position": "上九",
            "text": "观其生，君子无咎。",
            "xiang_text": "观其生，志未平也。"
          }
        ]
      },
      "110001": {
        "number": 42,
        "title": "益卦 风雷益 巽上震下",
        "gua_xiang": "———\n———\n— —\n— —\n— —\n———",
        "definition": "益：利有攸往，利涉大川。",
        "tuan": "益，损上益下，民说无疆。自上下下，其道大光。利有攸往，中正有庆。利涉大 川，木道乃行。益动而巽，日进无疆。天施地生，其益无方。凡益之道，与时偕行。",
        "xiang": "风雷，益。君子以见善则迁，有过则改。",
        "lines": [
          {
            "position": "初九",
            "text": "利用为大作，元吉，无咎。",
            "xiang_text": "元吉无咎，下不厚事也。"
          },
          {
            "position": "六二",
            "text": "或益之十朋之龟，弗克违。永贞吉。王用享于帝，吉。",
            "xiang_text": "或益之，自外来 也。"
          },
          {
            "position": "六三",
            "text": "益之用凶事，无咎。有孚中行，告公用圭。",
            "xiang_text": "益用凶事，固有之也。"
          },
          {
            "position": "六四",
            "text": "中行，告公从，利用为依迁国。",
            "xiang_text": "告公从，以益志也。"
          },
          {
            "position": "九五",
            "text": "有孚惠心，勿问元吉。有孚惠我德。",
            "xiang_text": "有孚惠心，勿问之矣。惠我德，大得志也。"
          },
          {
            "position": "上九",
            "text": "莫益之，或击之，立心勿恒，凶。",
            "xiang_text": "莫益之，偏辞也。或击之，自外来也。"
          }
        ]
      },
      "110010": {
        "number": 59,
        "title": "涣卦 风水涣 巽上坎下",
        "gua_xiang": "———\n———\n— —\n— —\n———\n— —",
        "definition": "涣：亨。王假有庙。利涉大川，利贞。",
        "tuan": "涣，亨。刚来而不穷，柔得位乎外而上同。王假有庙，王乃在中也。利涉大川， 乘木有功也。",
        "xiang": "风行水上，涣。先王以享于帝，立庙。",
        "lines": [
          {
            "position": "初六",
            "text": "用拯马壮，吉。",
            "xiang_text": "初六之吉，顺 也。"
          },
          {
            "position": "九二",
            "text": "涣奔其机，悔亡。",
            "xiang_text": "涣奔其机，得愿也。"
          },
          {
            "position": "六三",
            "text": "涣其躬，无悔。",
            "xiang_text": "涣其躬，志在外也。"
          },
          {
            "position": "六四",
            "text": "涣其群，元吉。涣有丘，匪夷所思。",
            "xiang_text": "涣其群，元吉，光大也。"
          },
          {
            "position": "九五",
            "text": "涣汗，其大号涣，王居，无咎。",
            "xiang_text": "王居无咎，正位也。"
          },
          {
            "position": "上九",
            "text": "涣其血，去逖出，无咎。",
            "xiang_text": "涣其血，远害也。"
          }
        ]
      },
      "110011": {
        "number": 61,
        "title": "中孚卦 风泽中孚 巽上兑下",
        "gua_xiang": "———\n———\n— —\n— —\n———\n———",
        "definition": "中孚：豚鱼，吉，利涉大川，利贞。",
        "tuan": "中孚，柔在内而刚得中。说而巽，孚乃化邦也。豚鱼吉，信及豚鱼也。利涉大 川，乘木舟虚也。中孚以利贞，乃应乎天也。",
        "xiang": "泽上有风，中孚。君子以议狱缓死。",
        "lines": [
          {
            "position": "初九",
            "text": "虞吉，有它不燕。",
            "xiang_text": "初九虞吉， 志未变也。"
          },
          {
            "position": "九二",
            "text": "鸣鹤在阴，其子和之。我有好爵，吾与尔靡之。",
            "xiang_text": "其子和之，中心愿也。"
          },
          {
            "position": "六三",
            "text": "得敌，或鼓或罢，或泣或歌。",
            "xiang_text": "可鼓或罢，位不当也。"
          },
          {
            "position": "六四",
            "text": "月几望，马匹亡，无咎。",
            "xiang_text": "马匹亡，绝类上也。"
          },
          {
            "position": "九五",
            "text": "有孚挛如，无咎。",
            "xiang_text": "有孚挛如，位正当也。"
          },
          {
            "position": "上九",
            "text": "翰音登于天，贞凶。",
            "xiang_text": "翰音登于天，何可长也。"
          }
        ]
      },
      "110100": {
        "number": 53,
        "title": "渐卦 风山渐 巽上艮下",
        "gua_xiang": "———\n———\n— —\n———\n— —\n— —",
        "definition": "渐：女归吉，利贞。",
        "tuan": "渐之进也，女归吉也。进得位，往有功也。进以正，可以正邦也。其位刚得中 也。止而巽，动不穷也。",
        "xiang": "山上有木，渐。君子以居贤德善俗。",
        "lines": [
          {
            "position": "初六",
            "text": "鸿渐于干，小子厉，有言，无咎。",
            "xiang_text": "小子之厉，义无咎也。"
          },
          {
            "position": "六二",
            "text": "鸿渐于磐，饮食衍衍，吉。",
            "xiang_text": "饮食衍衍，不素饱也。"
          },
          {
            "position": "九三",
            "text": "鸿渐于陆。夫征不复，妇孕不育，凶。利御寇。",
            "xiang_text": "夫征不复，离群丑也。妇孕不育，失其道也。利用御寇，顺相保也。"
          },
          {
            "position": "六四",
            "text": "鸿渐于木，或得其桷，无咎。",
            "xiang_text": "或得其桷，顺以巽也。"
          },
          {
            "position": "九五",
            "text": "鸿渐于陵，妇三岁不孕，终莫之胜，吉。",
            "xiang_text": "终莫之胜，吉，得所愿也。"
          },
          {
            "position": "上九",
            "text": "鸿渐于逵，其羽可用为仪，吉。",
            "xiang_text": "其羽可用为仪吉，不可乱也。"
          }
        ]
      },
      "110101": {
        "number": 37,
        "title": "家人卦 风火家人 巽上离下",
        "gua_xiang": "———\n———\n— —\n———\n— —\n———",
        "definition": "家人：利女贞。",
        "tuan": "家人，女正位乎内，男正位乎外。男女正，天地之大义也。家人有严君焉，父母之谓也。父父，子子，兄兄，弟弟，夫夫，妇妇，而家道正，正家而天下定矣。",
        "xiang": "风自火出，家人。君子以言有物而行有恒。",
        "lines": [
          {
            "position": "初九",
            "text": "闲有家，悔亡。",
            "xiang_text": "闲有家，志未变也。"
          },
          {
            "position": "六二",
            "text": "无攸遂，在中馈。贞吉",
            "xiang_text": "六二之吉，顺以巽也。"
          },
          {
            "position": "九三",
            "text": "家人嗃嗃，悔厉吉；妇子嘻嘻，终吝。",
            "xiang_text": "家人嗃嗃，未失也。妇子嘻嘻，失家节也。"
          },
          {
            "position": "六四",
            "text": "富家，大吉。",
            "xiang_text": "富家大吉，顺在位也。"
          },
          {
            "position": "九五",
            "text": "王假有家，勿恤，吉。",
            "xiang_text": "王假有家，交相爱也。"
          },
          {
            "position": "上九",
            "text": "有孚威如，终吉。",
            "xiang_text": "威如之吉，反身之谓也。"
          }
        ]
      },
      "110110": {
        "number": 57,
        "title": "巽卦 巽为风 巽上巽下",
        "gua_xiang": "———\n———\n— —\n———\n———\n— —",
        "definition": "巽：小亨。利有攸往，利见大人。",
        "tuan": "重巽以申命。刚巽乎中正而志行。柔皆顺乎刚，是以小亨，利有攸往，利见大 人。",
        "xiang": "随风，巽。君子以申命行事。",
        "lines": [
          {
            "position": "初六",
            "text": "进退，利武人之贞。",
            "xiang_text": "进退，志疑也。 利武人之贞，志治也。"
          },
          {
            "position": "九二",
            "text": "巽在床下，用史巫纷若，吉，无咎。",
            "xiang_text": "纷若之吉，得中也。"
          },
          {
            "position": "九三",
            "text": "频巽，吝。",
            "xiang_text": "频巽之吝，志穷也。"
          },
          {
            "position": "六四",
            "text": "悔亡，田获三品。",
            "xiang_text": "田获三品，有功也。"
          },
          {
            "position": "九五",
            "text": "贞吉，悔亡，无不利。无初有终。先庚三日，后庚三日，吉。",
            "xiang_text": "九五之吉，位 正中也。"
          },
          {
            "position": "上九",
            "text": "巽在床下，丧其资斧，贞凶。",
            "xiang_text": "巽在床下，上穷也。丧其资斧，正乎凶也。"
          }
        ]
      },
      "110111": {
        "number": 9,
        "title": "小畜卦 风天小畜 巽上乾下",
        "gua_xiang": "———\n———\n— —\n———\n———\n———",
        "definition": "小畜：亨。密云不雨，自我西郊。",
        "tuan": "小畜；柔得位而上下应之，曰小畜。健而巽，刚中而志行，乃亨。密云不雨， 尚往也。自我西郊，施未行也。",
        "xiang": "风行天上，小畜。君子以懿文德。",
        "lines": [
          {
            "position": "初九",
            "text": "复自道，何其咎？吉。",
            "xiang_text": "复自道， 其义吉也。"
          },
          {
            "position": "九二",
            "text": "牵复，吉。",
            "xiang_text": "牵复在中，亦不自失也。"
          },
          {
            "position": "九三",
            "text": "舆说辐，夫妻反目。",
            "xiang_text": "夫 妻反目，不能正室也。"
          },
          {
            "position": "六四",
            "text": "有孚，血去惕出，无咎。",
            "xiang_text": "有孚惕出，上合志也。"
          },
          {
            "position": "九五",
            "text": "有孚挛如，富以其邻。",
            "xiang_text": "有孚挛如，不独富也。"
          },
          {
            "position": "上九",
            "text": "既雨既处，尚德载。妇贞厉。月几望，君子征凶。",
            "xiang_text": "既雨既处，德积载也。 君子征凶，有所疑也。"
          }
        ]
      },
      "111000": {
        "number": 12,
        "title": "否卦 天地否 乾上坤下",
        "gua_xiang": "———\n———\n———\n— —\n— —\n— —",
        "definition": "否：否之匪人，不利君子贞，大往小来。",
        "tuan": "否之匪人，不利君子贞，大往小来。则是天地不交而万物不通也，上下不交，而天下无邦也。内阴而外阳，内柔而外刚，内小人而外君子。小人道长，君子道消也。",
        "xiang": "天地不交，否。君子以俭德辟难，不可荣以禄。",
        "lines": [
          {
            "position": "初六",
            "text": "拔茅茹，以其汇，贞吉，亨。",
            "xiang_text": "拔茅贞吉，志在君也。"
          },
          {
            "position": "六二",
            "text": "包承，小人吉，大人否，亨。",
            "xiang_text": "大人否，亨，不乱群也。"
          },
          {
            "position": "六三",
            "text": "包羞。",
            "xiang_text": "包羞，位不当也。"
          },
          {
            "position": "九四",
            "text": "有命无咎，畴离祉。",
            "xiang_text": "有命无咎，志行也。"
          },
          {
            "position": "九五",
            "text": "休否，大人吉。其亡其亡，系于苞桑。",
            "xiang_text": "大人之吉，位正当也。"
          },
          {
            "position": "上九",
            "text": "倾否，先否后喜。",
            "xiang_text": "否终则倾，何可长也。"
          }
        ]
      },
      "111001": {
        "number": 25,
        "title": "无妄卦 天雷无妄 乾上震下",
        "gua_xiang": "———\n———\n———\n— —\n— —\n———",
        "definition": "无妄：元亨利贞。其匪正有眚，不利有攸往。",
        "tuan": "无妄，刚自外来而为主于内。动而健，刚中而应，大亨以正，天之命也。其匪正有眚，不利有攸往。无妄之往，何之矣？天命不佑，行矣哉？",
        "xiang": "天下雷行，物与无妄。先王以茂对时，育万物。",
        "lines": [
          {
            "position": "初九",
            "text": "无妄，往吉。",
            "xiang_text": "无妄之往，得志也。"
          },
          {
            "position": "六二",
            "text": "不耕获，不菑畲，则利有攸往。",
            "xiang_text": "不耕获，未富也。"
          },
          {
            "position": "六三",
            "text": "无妄之灾。或系之牛，行人之得，邑人之灾。",
            "xiang_text": "行人得牛，邑人灾也。"
          },
          {
            "position": "九四",
            "text": "可贞，无咎。",
            "xiang_text": "象曰：可贞无咎，固有之也。"
          },
          {
            "position": "九五",
            "text": "无妄之疾，勿药有喜。",
            "xiang_text": "无妄之药，不可试也。"
          },
          {
            "position": "上九",
            "text": "无妄，行有眚，无攸利。",
            "xiang_text": "无妄之行，穷之灾也。"
          }
        ]
      },
      "111010": {
        "number": 6,
        "title": "讼卦 天水讼 乾上坎下",
        "gua_xiang": "———\n———\n———\n— —\n———\n— —",
        "definition": "讼：有孚，窒惕，中吉。终凶。利见大人，不利涉大川。",
        "tuan": "讼，上刚下险，险而健，讼。讼有孚，窒惕，中吉，刚来而得中也。终凶，讼不可成也。利见大人，尚中正也。不利涉大川，入于渊也。",
        "xiang": "天与水违行，讼。君子以作事谋始。",
        "lines": [
          {
            "position": "初六",
            "text": "不永所事，小有言，终吉。",
            "xiang_text": "不永所事，讼不可长也。虽有小言，其辩明也。"
          },
          {
            "position": "九二",
            "text": "不克讼，归而逋，其邑人三百户无眚。",
            "xiang_text": "不克讼，归逋窜也。自下讼上， 患至掇也。"
          },
          {
            "position": "六三",
            "text": "食旧德，贞厉，终吉。或从王事，无成。",
            "xiang_text": "食旧德，从上吉也。"
          },
          {
            "position": "九四",
            "text": "不克讼，复自命，渝安贞，吉。",
            "xiang_text": "复即命，渝安贞；不失也。"
          },
          {
            "position": "九五",
            "text": "讼，元吉。",
            "xiang_text": "讼，元吉，以中正也。"
          },
          {
            "position": "上九",
            "text": "或锡之鞶带，终朝三褫之。",
            "xiang_text": "以讼受福，亦不足敬也。"
          }
        ]
      },
      "111011": {
        "number": 10,
        "title": "履卦 天泽履 乾上兑下",
        "gua_xiang": "———\n———\n———\n— —\n———\n———",
        "definition": "履：履虎尾，不咥人，亨。",
        "tuan": "履，柔履刚也。说而应乎乾，是以履虎尾，不咥人，亨。刚中正，履帝位而不 疚，光明也。",
        "xiang": "上天下泽，履。君子以辨上下，定民志。",
        "lines": [
          {
            "position": "初九",
            "text": "素履往，无咎。",
            "xiang_text": "素履之往，独行愿也。"
          },
          {
            "position": "九二",
            "text": "履道坦坦，幽人贞吉。",
            "xiang_text": "幽人贞吉，中不自乱也。"
          },
          {
            "position": "六三",
            "text": "眇能视，跛能履。履虎尾，咥人，凶。武人为于大君。",
            "xiang_text": "眇能视，不足以 有明也。跛能履，不足以与行也。咥人之凶，位不当也。武人为于大君，志刚也。"
          },
          {
            "position": "九四",
            "text": "履虎尾，愬愬，终吉。",
            "xiang_text": "愬愬终吉，志行也。"
          },
          {
            "position": "九五",
            "text": "夬履，贞厉。",
            "xiang_text": "夬履贞厉，位正当也。"
          },
          {
            "position": "上九",
            "text": "视履考祥，其旋元吉。",
            "xiang_text": "元吉在上，大有庆也。"
          }
        ]
      },
      "111100": {
        "number": 33,
        "title": "遁卦 天山遁 乾上艮下",
        "gua_xiang": "———\n———\n———\n———\n— —\n— —",
        "definition": "遁：亨。小利贞。",
        "tuan": "遁亨，遁而亨也。刚当位而应，与时行也。小利贞，浸而长也。遁之时义大矣 哉。",
        "xiang": "天下有山，遁。君子以远小人，不恶而严。",
        "lines": [
          {
            "position": "初六",
            "text": "遁尾，厉。勿用有攸往。",
            "xiang_text": "遁尾之厉，不往何灾也。"
          },
          {
            "position": "六二",
            "text": "执之用黄牛之革，莫之胜说。",
            "xiang_text": "执用黄牛，固志也。"
          },
          {
            "position": "九三",
            "text": "系遁，有疾厉，畜臣妾，吉。",
            "xiang_text": "系遁之厉，有疾惫也。畜臣妾吉，不可大事也。"
          },
          {
            "position": "九四",
            "text": "好遁。君子吉，小人否。",
            "xiang_text": "君子好遁，小人否也。"
          },
          {
            "position": "九五",
            "text": "嘉遁，贞吉。",
            "xiang_text": "嘉遁贞吉，以正志也。"
          },
          {
            "position": "上九",
            "text": "肥遁，无不利。",
            "xiang_text": "肥遁，无不利，无所疑也。"
          }
        ]
      },
      "111101": {
        "number": 13,
        "title": "同人卦 天火同人 乾上离下",
        "gua_xiang": "———\n———\n———\n———\n— —\n———",
        "definition": "同人：同人于野，亨。利涉大川，利君子贞。",
        "tuan": "同人，柔得位得中，而应乎乾，曰同人。同人曰，同人于野，亨。利涉大川，乾 行也。文明以健，中正而应，君子正也。唯君子为能通天下之志。",
        "xiang": "天与火，同人。君子以类族辨物。",
        "lines": [
          {
            "position": "初九",
            "text": "同人于门，无咎。",
            "xiang_text": "出门同人，又 谁咎也。"
          },
          {
            "position": "六二",
            "text": "同人于宗，吝。",
            "xiang_text": "同人于宗，吝道也。"
          },
          {
            "position": "九三",
            "text": "伏戎于莽，升其高陵，三岁不兴。",
            "xiang_text": "伏戎于莽，敌刚也。三岁不兴，安行 也。"
          },
          {
            "position": "九四",
            "text": "乘其墉，弗克攻，吉。",
            "xiang_text": "乘其墉，义弗克也，其吉，则困而反则也。"
          },
          {
            "position": "九五",
            "text": "同人，先号咷而后笑。大师克相遇。",
            "xiang_text": "同人之先，以中直也。大师相遇，言相克也。"
          },
          {
            "position": "上九",
            "text": "同人于郊，无悔。",
            "xiang_text": "同人于郊，志未得也。"
          }
        ]
      },
      "111110": {
        "number": 44,
        "title": "姤卦 天风姤 乾上巽下",
        "gua_xiang": "———\n———\n———\n———\n———\n— —",
        "definition": "姤：女壮，勿用取女。",
        "tuan": "姤，遇也，柔遇刚也。勿用取女，不可与长也。天地相遇，品物咸章也。刚遇中正，天下大行也。姤之时义大矣哉！",
        "xiang": "天下有风，姤；后以施命诰四方。",
        "lines": [
          {
            "position": "初六",
            "text": "系于金柅，贞吉。有攸往，见凶， 羸豕踟躅。",
            "xiang_text": "系于金柅，柔道牵也。"
          },
          {
            "position": "九二",
            "text": "包有鱼，无咎，不利宾。",
            "xiang_text": "包有鱼，义不及宾也。"
          },
          {
            "position": "九三",
            "text": "臀无肤，其行次且，厉，无大咎。",
            "xiang_text": "其行次且，行未牵也。"
          },
          {
            "position": "九四",
            "text": "包无鱼，起凶。",
            "xiang_text": "无鱼之凶，远民也。"
          },
          {
            "position": "九五",
            "text": "以杞包瓜，含章，有陨自天。",
            "xiang_text": "九五含章，中正也。有陨自天，志不舍命 也。"
          },
          {
            "position": "上九",
            "text": "姤其角，吝，无咎。",
            "xiang_text": "姤其角，上穷吝也。"
          }
        ]
      },
      "111111": {
        "number": 1,
        "title": "乾卦 乾为天 乾上乾下",
        "gua_xiang": "———\n———\n———\n———\n———\n———",
        "definition": "乾：元，亨，利，贞。",
        "tuan": "大哉乾元，万物资始，乃统天。云行雨施，品物流形。大明始终，六位时成，时 乘六龙以御天。乾道变化，各正性命，保合大和，乃利贞。首出庶物，万国咸宁。",
        "xiang": "天行健，君子以自强不息。潜龙勿用，阳在下也。见龙再田，德施普也。终日乾 乾，反复道也。或跃在渊，进无咎也。飞龙在天，大人造也。亢龙有悔，盈不可久也。用 九，天德不可为首也。",
        "lines": [
          {
            "position": "初九",
            "text": "潜龙勿用。",
            "xiang_text": "潜龙勿用，阳在下也。"
          },
          {
            "position": "九二",
            "text": "见龙在田，利见大人。",
            "xiang_text": "见龙在田，德施普也。"
          },
          {
            "position": "九三",
            "text": "君子终日乾乾，夕惕若厉，无咎。",
            "xiang_text": "终日乾乾，反复道也。"
          },
          {
            "position": "九四",
            "text": "或跃在渊，无咎。",
            "xiang_text": "或跃在渊，进无咎也。"
          },
          {
            "position": "九五",
            "text": "飞龙在天，利见大人。",
            "xiang_text": "飞龙在天，大人造也。"
          },
          {
            "position": "上九",
            "text": "亢龙有悔。",
            "xiang_text": "亢龙有悔，盈不可久也。"
          }
        ]
      },
      "000000": {
        "number": 2,
        "title": "坤卦 坤为地 坤上坤下",
        "gua_xiang": "— —\n— —\n— —\n— —\n— —\n— —",
        "definition": "坤：元亨，利牝马之贞。君子有攸往，先迷后得主。利西南得朋，东北丧朋。安贞吉。",
        "tuan": "至哉坤元，万物资生，乃顺承天。坤厚载物，德合无疆。含弘光大，品物咸亨。牝马地类，行地无疆，柔顺利贞。君子攸行，先迷失道，后顺得常。西南得朋，乃与类行；东北丧朋，乃终有庆。安贞之吉，应地无疆。",
        "xiang": "地势坤，君子以厚德载物。",
        "lines": [
          {
            "position": "初六",
            "text": "履霜，坚冰至。",
            "xiang_text": "履霜坚冰，阴始凝也。驯致其道，至坚冰也。"
          },
          {
            "position": "六二",
            "text": "直方大，不习，无不利。",
            "xiang_text": "六二之动，直以方也。不习，无不利，地道光也。"
          },
          {
            "position": "六三",
            "text": "含章可贞。或从王事，无成有终。",
            "xiang_text": "含章可贞；以时发也。或从王事，知光大也。"
          },
          {
            "position": "六四",
            "text": "括囊，无咎无誉。",
            "xiang_text": "括囊无咎，慎不害也。"
          },
          {
            "position": "六五",
            "text": "黄裳，元吉。",
            "xiang_text": "黄裳元吉，文在中也。"
          },
          {
            "position": "上六",
            "text": "龙战于野，其血玄黄。",
            "xiang_text": "龙战于野，其道穷也。"
          }
        ]
      },
      "010001": {
        "number": 3,
        "title": "屯卦 水雷屯 坎上震下",
        "gua_xiang": "— —\n———\n— —\n— —\n— —\n———",
        "definition": "屯：元亨利贞。勿用有攸往，利建侯。",
        "tuan": "屯，刚柔始交而难生。动乎险中，大亨贞。雷雨之动满盈，天造草昧，宜建侯而 不宁。",
        "xiang": "云雷屯，君子以经纶。",
        "lines": [
          {
            "position": "初九",
            "text": "磐桓，利居贞，利建侯。",
            "xiang_text": "虽磐桓，志行正也。以贵下贱，大得民也。"
          },
          {
            "position": "六二",
            "text": "屯如邅如，乘马班如。匪寇，婚媾，女子贞不字，十年乃字。",
            "xiang_text": "六二之难，乘刚也。十年乃字，反常也。"
          },
          {
            "position": "六三",
            "text": "既鹿无虞，惟入于林中。君子几，不如舍，往吝。",
            "xiang_text": "既鹿无虞，以纵禽也。君 子舍之，往吝，穷也。"
          },
          {
            "position": "六四",
            "text": "乘马班如，求婚媾，往吉，无不利。",
            "xiang_text": "求而往，明也。"
          },
          {
            "position": "九五",
            "text": "屯其膏，小贞吉，大贞凶。",
            "xiang_text": "屯其膏，施未光也。"
          },
          {
            "position": "上六",
            "text": "乘马班如，泣血涟如。",
            "xiang_text": "泣血涟如，何可长也。"
          }
        ]
      },
      "010111": {
        "number": 5,
        "title": "需卦 水天需 坎上乾下",
        "gua_xiang": "— —\n———\n— —\n———\n———\n———",
        "definition": "需：有孚，光亨，贞吉。利涉大川。",
        "tuan": "需，须也，险在前也。刚健而不陷，其义不困穷矣。需有孚，光亨，贞吉。位乎 天位，以正中也。利涉大川，往有功也。",
        "xiang": "云上於天，需。君子以饮食宴乐。",
        "lines": [
          {
            "position": "初九",
            "text": "需 于郊，利用恒，无咎。",
            "xiang_text": "需于郊，不犯难行也。利用恒，无咎；未失常也。"
          },
          {
            "position": "九二",
            "text": "需于沙，小有言，终吉。",
            "xiang_text": "需于沙，衍在中也。虽小有言，以终吉也。"
          },
          {
            "position": "九三",
            "text": "需于泥，致寇至。",
            "xiang_text": "需于泥，灾在外也。自我致寇，敬慎不败也。"
          },
          {
            "position": "六四",
            "text": "需于血，出自穴。",
            "xiang_text": "需于血，顺以听也。"
          },
          {
            "position": "九五",
            "text": "需于酒食，贞吉。",
            "xiang_text": "酒食贞吉，以中正也。"
          },
          {
            "position": "上六",
            "text": "入于穴，有不速之客三人 来，敬之终吉。",
            "xiang_text": "不速之客来，敬之终吉。虽不当位，未大失也。"
          }
        ]
      },
      "000010": {
        "number": 7,
        "title": "师卦 地水师 坤上坎下",
        "gua_xiang": "— —\n— —\n— —\n— —\n———\n— —",
        "definition": "师：贞，丈人吉，无咎。",
        "tuan": "师，众也，贞正也，能以众正，可以王矣。刚中而应，行险而顺，以此毒天下， 而民从之，吉又何咎矣？",
        "xiang": "地中有水，师，君子以容民蓄众。",
        "lines": [
          {
            "position": "初六",
            "text": "师出以律，否臧凶。",
            "xiang_text": "师出以律， 失律凶也。"
          },
          {
            "position": "九二",
            "text": "在师，中吉，无咎，王三锡命。",
            "xiang_text": "在师中吉，承天宠也。王三锡命，怀万邦也。"
          },
          {
            "position": "六三",
            "text": "师或舆尸，凶。",
            "xiang_text": "师或舆尸，大无功也。"
          },
          {
            "position": "六四",
            "text": "师左次，无咎。",
            "xiang_text": "左次无咎，未失常也。"
          },
          {
            "position": "六五",
            "text": "田有禽，利执；言，无咎。长子帅师，弟子舆尸，贞凶。",
            "xiang_text": "长子帅师，以中行也。弟子舆师，使不当也。"
          },
          {
            "position": "上六",
            "text": "大君有命，开国承家，小人勿用。",
            "xiang_text": "大君有命，以正功也。小人勿用，必乱邦也。"
          }
        ]
      },
      "010000": {
        "number": 8,
        "title": "比卦 水地比 坎上坤下",
        "gua_xiang": "— —\n———\n— —\n— —\n— —\n— —",
        "definition": "比：吉。原筮，元永贞，无咎。不宁方来，后夫凶。",
        "tuan": "比，吉也。比，辅也，下顺从也。原筮，元永贞，无咎，以刚中也。不宁方来，上 下应也。后夫凶，其道穷也。",
        "xiang": "地上有水，比。先王以建万国，亲诸侯。",
        "lines": [
          {
            "position": "初六",
            "text": "有孚比之，无咎。有孚盈缶，终来有它吉。",
            "xiang_text": "比之初六，有它吉也。"
          },
          {
            "position": "六二",
            "text": "比之自内，贞吉。",
            "xiang_text": "比之自内，不自失也。"
          },
          {
            "position": "六三",
            "text": "比之匪人。",
            "xiang_text": "比之匪人，不亦伤乎？"
          },
          {
            "position": "六四",
            "text": "外比之，贞吉。",
            "xiang_text": "外比于贤，以从上也。"
          },
          {
            "position": "九五",
            "text": "显比，王用三驱，失前禽。邑人不诫，吉。",
            "xiang_text": "显比之吉，位正中也。舍逆取顺，失前禽也。邑人不诫，上使中也。"
          },
          {
            "position": "上六",
            "text": "比之无首，凶。",
            "xiang_text": "比之无首，无所终也。"
          }
        ]
      },
      "000111": {
        "number": 11,
        "title": "泰卦 地天泰 坤上乾下",
        "gua_xiang": "— —\n— —\n— —\n———\n———\n———",
        "definition": "泰：小往大来，吉亨。",
        "tuan": "泰，小往大来，吉亨。则是天地交而万物通也，上下交而其志同也。内阳而外阴，内健而外顺，内君子而外小人。君子道长，小人道消也。",
        "xiang": "天地交，泰。后以财成天地之道，辅相天地之宜，以左右民。",
        "lines": [
          {
            "position": "初九",
            "text": "拔茅茹，以其汇，征吉。",
            "xiang_text": "拔茅征吉，志在外也。"
          },
          {
            "position": "九二",
            "text": "包荒，用冯河，不遐遗。朋亡，得尚于中行。",
            "xiang_text": "包荒，得尚于中行，以光大也。"
          },
          {
            "position": "九三",
            "text": "无平不陂，无往不复，艰贞无咎。勿恤其孚，于食有福。",
            "xiang_text": "无往不复，天地际也。"
          },
          {
            "position": "六四",
            "text": "翩翩，不富以其邻，不戒以孚。",
            "xiang_text": "翩翩不富，皆失实也。不戒以孚，中心愿也。"
          },
          {
            "position": "六五",
            "text": "帝乙归妹，以祉元吉。",
            "xiang_text": "以祉元吉，中以行愿也。"
          },
          {
            "position": "上六",
            "text": "城复于隍，勿用师。自邑告命，贞吝。",
            "xiang_text": "城复于隍，其命乱也。"
          }
        ]
      },
      "000100": {
        "number": 15,
        "title": "谦卦 地山谦 坤上艮下",
        "gua_xiang": "— —\n— —\n— —\n———\n— —\n— —",
        "definition": "谦：亨，君子有终。",
        "tuan": "谦，亨。天道下济而光明，地道卑而上行。天道亏盈而益谦，地道变盈而流谦， 鬼神害盈而福谦，人道恶盈而好谦。谦尊而光，卑而不可踰，君子之终也。",
        "xiang": "地中有山，谦。君子以裒多益寡，称物平施。",
        "lines": [
          {
            "position": "初六",
            "text": "谦谦君子，用涉大川，吉。",
            "xiang_text": "谦谦君子，卑以自牧也。"
          },
          {
            "position": "六二",
            "text": "鸣谦，贞吉。",
            "xiang_text": "鸣谦贞吉，中心得也。"
          },
          {
            "position": "九三",
            "text": "劳谦君子，有终，吉。",
            "xiang_text": "劳谦君子，万民服也。"
          },
          {
            "position": "六四",
            "text": "无不利，㧑谦。",
            "xiang_text": "无不利，㧑谦，不违则也。"
          },
          {
            "position": "六五",
            "text": "不富以其邻，利用侵伐，无不利。",
            "xiang_text": "利用侵伐，征不服也。"
          },
          {
            "position": "上六",
            "text": "鸣谦，利用行师，征邑国。",
            "xiang_text": "鸣谦，志未得也。可用行师，征邑国也。"
          }
        ]
      },
      "001000": {
        "number": 16,
        "title": "豫卦 雷地豫 震上坤下",
        "gua_xiang": "— —\n— —\n———\n— —\n— —\n— —",
        "definition": "豫：利建侯行师。",
        "tuan": "豫，刚应而志行，顺以动，豫。豫，顺以动，故天地如之，而况建侯行师乎！天 地以顺动，故日月不过而四时不忒。圣人以顺动，则刑罚清而民服。豫之时义大矣哉！",
        "xiang": "雷出地奋，豫。先王以作乐崇德，殷荐之上帝，以配祖考。",
        "lines": [
          {
            "position": "初六",
            "text": "鸣豫，凶。",
            "xiang_text": "初六鸣豫，志穷凶也。"
          },
          {
            "position": "六二",
            "text": "介于石，不终日，贞吉。",
            "xiang_text": "不终日，贞吉；以中正也。"
          },
          {
            "position": "六三",
            "text": "盱豫，悔。迟有悔。",
            "xiang_text": "盱豫有悔，位不当也。"
          },
          {
            "position": "九四",
            "text": "由豫，大有得。勿疑，朋盍簪。",
            "xiang_text": "由豫大有得，志大行也。"
          },
          {
            "position": "六五",
            "text": "贞疾，恒不死。",
            "xiang_text": "六五贞疾，乘刚也。恒不死，中未亡也。"
          },
          {
            "position": "上六",
            "text": "冥豫，成有渝，无咎。",
            "xiang_text": "冥豫在上，何可长也？"
          }
        ]
      },
      "011001": {
        "number": 17,
        "title": "随卦 泽雷随 兑上震下",
        "gua_xiang": "— —\n———\n———\n— —\n— —\n———",
        "definition": "随：元亨利贞，无咎。",
        "tuan": "随，刚来而下柔，动而说，随。大亨贞，无咎，而天下随时。随之时义大矣哉！",
        "xiang": "泽中有雷，随。君子以向晦入宴息。",
        "lines": [
          {
            "position": "初九",
            "text": "官有渝，贞吉。出门交有功。",
            "xiang_text": "官有渝，从正吉也。出门交有功，不失也。"
          },
          {
            "position": "六二",
            "text": "系小子，失丈夫。",
            "xiang_text": "系小子，弗兼与也。"
          },
          {
            "position": "六三",
            "text": "系丈夫，失小子。随有求，得，利居贞。",
            "xiang_text": "系丈夫，志舍下也。"
          },
          {
            "position": "九四",
            "text": "随有获，贞凶。有孚，在道以明，何咎？",
            "xiang_text": "随有获，其义凶也。有孚在道， 明功也。"
          },
          {
            "position": "九五",
            "text": "孚于嘉，吉。",
            "xiang_text": "孚于嘉吉，位正中也。"
          },
          {
            "position": "上六",
            "text": "拘系之，乃从维之。王用亨于西山。",
            "xiang_text": "拘系之，上穷也。"
          }
        ]
      },
      "000011": {
        "number": 19,
        "title": "临卦 地泽临 坤上兑下",
        "gua_xiang": "— —\n— —\n— —\n— —\n———\n———",
        "definition": "临：元，亨，利，贞。至于八月有凶。",
        "tuan": "临，刚浸而长。说而顺，刚中而应。大亨以正，天之道也。至于八月有凶，消不 久也。",
        "xiang": "泽上有地，临。君子以教思无穷，容保民无疆。",
        "lines": [
          {
            "position": "初九",
            "text": "咸临，贞吉。",
            "xiang_text": "咸临 贞吉，志行正也。"
          },
          {
            "position": "九二",
            "text": "咸临，吉，无不利。",
            "xiang_text": "咸临，吉，无不利，未顺命也。"
          },
          {
            "position": "六三",
            "text": "甘临，无攸利。既忧之，无咎。",
            "xiang_text": "甘临，位不当也。既忧之，咎不长也。"
          },
          {
            "position": "六四",
            "text": "至临，无咎。",
            "xiang_text": "至临无咎，位当也。"
          },
          {
            "position": "六五",
            "text": "知临，大君之宜，吉。",
            "xiang_text": "大君之宜，行中之谓也。"
          },
          {
            "position": "上六",
            "text": "敦临，吉，无咎。",
            "xiang_text": "敦临之吉，志在内也。"
          }
        ]
      },
      "000001": {
        "number": 24,
        "title": "复卦 地雷复 坤上震下",
        "gua_xiang": "— —\n— —\n— —\n— —\n— —\n———",
        "definition": "复：亨。出入无疾，朋来无咎。反复其道，七日来复，利有攸往。",
        "tuan": "复。亨。刚反，动而以顺行，是以出入无疾，朋来无咎。反复其道，七日来复，天行也。利有攸往，刚长也。复其见天地之心乎？",
        "xiang": "雷在地中，复。先王以至日闭关，商旅不行，后不省方。",
        "lines": [
          {
            "position": "初九",
            "text": "不远复，无祗悔，元吉。",
            "xiang_text": "不远之复，以修身也。"
          },
          {
            "position": "六二",
            "text": "休复，吉。",
            "xiang_text": "休复之吉，以下仁也。"
          },
          {
            "position": "六三",
            "text": "频复，厉，无咎。",
            "xiang_text": "频复之厉，义无咎也。"
          },
          {
            "position": "六四",
            "text": "中行独复。",
            "xiang_text": "中行独复，以从道也。"
          },
          {
            "position": "六五",
            "text": "敦复，无悔。",
            "xiang_text": "敦复无悔，中以自考也。"
          },
          {
            "position": "上六",
            "text": "迷复，凶，有灾眚。用行师，终有大败，以其国君凶，至于十年，不克征。",
            "xiang_text": "迷复之凶，反君道也。"
          }
        ]
      },
      "011110": {
        "number": 28,
        "title": "大过卦 泽风大过 兑上巽下",
        "gua_xiang": "— —\n———\n———\n———\n———\n— —",
        "definition": "大过：栋桡，利有攸往，亨。",
        "tuan": "大过，大者过也。栋桡，本末弱也。刚过而中，巽而说行，利有攸往，乃亨。大 过之时义大矣哉。",
        "xiang": "泽灭木，大过。君子以独立不惧，遯世无闷。",
        "lines": [
          {
            "position": "初六",
            "text": "藉用白茅，无咎。",
            "xiang_text": "藉用白茅，柔在下也。"
          },
          {
            "position": "九二",
            "text": "枯杨生稊，老夫得其女妻，无不利。",
            "xiang_text": "老夫女妻，过以相与也。"
          },
          {
            "position": "九三",
            "text": "栋桡，凶。",
            "xiang_text": "栋桡之凶，不可以有辅也。"
          },
          {
            "position": "九四",
            "text": "栋隆，吉。它吝。",
            "xiang_text": "栋隆之吉，不桡乎下也。"
          },
          {
            "position": "九五",
            "text": "枯杨生华，老妇得士夫，无咎无誉。",
            "xiang_text": "枯杨生华，何可久也？老妇士夫，亦可丑也。"
          },
          {
            "position": "上六",
            "text": "过涉灭顶，凶，无咎。",
            "xiang_text": "过涉之凶，不可咎也。"
          }
        ]
      },
      "010010": {
        "number": 29,
        "title": "坎卦 坎为水 坎上坎下",
        "gua_xiang": "— —\n———\n— —\n— —\n———\n— —",
        "definition": "坎：习坎，有孚。维心亨。行有尚。",
        "tuan": "习坎，重险也。水流而不盈，行险而不失其信。维心亨，乃以刚中也。行有尚， 往有功也。天险，不可升也；地险，山川丘陵也。王公设险以守其国。险之时用大矣哉！",
        "xiang": "水洊至，习坎。君子以常德行，习教事。",
        "lines": [
          {
            "position": "初六",
            "text": "习坎，入于坎窞，凶。",
            "xiang_text": "习坎入坎，失道凶也。"
          },
          {
            "position": "九二",
            "text": "坎有险，求小得。",
            "xiang_text": "求小得，未出中也。"
          },
          {
            "position": "六三",
            "text": "来之坎坎，险且枕，入于坎窞，勿用。",
            "xiang_text": "来之坎坎，终无功也。"
          },
          {
            "position": "六四",
            "text": "樽酒簋贰，用缶，纳约自牖，终无咎。",
            "xiang_text": "樽酒簋贰，刚柔际也。"
          },
          {
            "position": "九五",
            "text": "坎不盈，祗既平，无咎。",
            "xiang_text": "坎不盈，中未大也。"
          },
          {
            "position": "上六",
            "text": "系用徽繹，置于丛棘，三岁不得，凶。",
            "xiang_text": "上六失道，凶三岁也。"
          }
        ]
      },
      "011100": {
        "number": 31,
        "title": "咸卦 泽山咸 兑上艮下",
        "gua_xiang": "— —\n———\n———\n———\n— —\n— —",
        "definition": "咸：亨，利贞。取女吉。",
        "tuan": "咸，感也。柔上而刚下，二气感应以相与。止而说，男下女。是以亨利贞，取女 吉也。天地感而万物化生，圣人感人心而天下和平。观其所感，而天地万物之情可见矣。",
        "xiang": "山上有泽，咸。君子以虚受人。",
        "lines": [
          {
            "position": "初六",
            "text": "咸其拇。",
            "xiang_text": "咸其拇，志在外也。"
          },
          {
            "position": "六二",
            "text": "咸其腓，凶，居吉。",
            "xiang_text": "虽凶居吉，顺不害也。"
          },
          {
            "position": "九三",
            "text": "咸其股，执其随，往吝。",
            "xiang_text": "咸其股，亦不处也。志在随人，所执下也。"
          },
          {
            "position": "九四",
            "text": "贞吉悔亡，憧憧往来，朋从尔思。",
            "xiang_text": "贞吉悔亡，未感害也。憧憧往来，未光大也。"
          },
          {
            "position": "九五",
            "text": "咸其脢，无悔。",
            "xiang_text": "咸其脢，志末也。"
          },
          {
            "position": "上六",
            "text": "咸其辅，颊，舌。",
            "xiang_text": "咸其辅，颊，舌，滕口说也。"
          }
        ]
      },
      "001110": {
        "number": 32,
        "title": "恒卦 雷风恒 震上巽下",
        "gua_xiang": "— —\n— —\n———\n———\n———\n— —",
        "definition": "恒：亨，无咎，利贞。利有攸往。",
        "tuan": "恒，久也。刚上而柔下。雷风相与，巽而动，刚柔皆应，恒。恒亨，无咎，利贞； 久於其道也。天地之道，恒久而不已也。利有攸往，终则有始也。日月得天而能久照，四时变化而能久成，圣人久于其道而天下化成。观其所恒，而天地万物之情可见矣！",
        "xiang": "雷风，恒。君子以立不易方。",
        "lines": [
          {
            "position": "初六",
            "text": "浚恒，贞凶，无攸利。",
            "xiang_text": "浚恒之凶，始求深也。"
          },
          {
            "position": "九二",
            "text": "悔亡。",
            "xiang_text": "九二悔亡，能久中也。"
          },
          {
            "position": "九三",
            "text": "不恒其德，或承之羞，贞吝。",
            "xiang_text": "不恒其德，无所容也。"
          },
          {
            "position": "九四",
            "text": "田无禽。",
            "xiang_text": "久非其位，安得禽也？"
          },
          {
            "position": "六五",
            "text": "恒其德，贞。妇人吉，夫子凶。",
            "xiang_text": "妇人贞吉，从一而终也。夫子制义，从妇凶也。"
          },
          {
            "position": "上六",
            "text": "振恒，凶。",
            "xiang_text": "振恒在上，大无功也。"
          }
        ]
      },
      "001111": {
        "number": 34,
        "title": "大壮卦 雷天大壮 震上乾下",
        "gua_xiang": "— —\n— —\n———\n———\n———\n———",
        "definition": "大壮：利贞。",
        "tuan": "大壮，大者壮也。刚以动，故壮。大壮利贞，大者正也。正大而天地之情可见矣！",
        "xiang": "雷在天上，大壮。君子以非礼弗履。",
        "lines": [
          {
            "position": "初九",
            "text": "壮于趾，征凶，有孚。",
            "xiang_text": "壮于趾，其孚穷也。"
          },
          {
            "position": "九二",
            "text": "贞吉。",
            "xiang_text": "九二贞吉，以中也。"
          },
          {
            "position": "九三",
            "text": "小人用壮，君子用罔，贞厉。羝羊触藩，羸其角。",
            "xiang_text": "小人用壮，君子罔也。"
          },
          {
            "position": "九四",
            "text": "贞吉悔亡，藩决不羸，壮于大舆之輹。",
            "xiang_text": "藩决不羸，尚往也。"
          },
          {
            "position": "六五",
            "text": "丧羊于易，无悔。",
            "xiang_text": "丧羊于易，位不当也。"
          },
          {
            "position": "上六",
            "text": "羝羊触藩，不能退，不能遂，无攸利，艰则吉。",
            "xiang_text": "不能退，不能遂，不祥也。艰则吉，咎不长也。"
          }
        ]
      },
      "000101": {
        "number": 36,
        "title": "明夷卦 地火明夷 坤上离下",
        "gua_xiang": "— —\n— —\n— —\n———\n— —\n———",
        "definition": "明夷：利艰贞。",
        "tuan": "明入地中，明夷。内文明而外柔顺，以蒙大难，文王以之。利艰贞，晦其明也。 内难而能正其志，箕子以之。",
        "xiang": "明入地中，明夷。君子以莅众用晦而明。",
        "lines": [
          {
            "position": "初九",
            "text": "明夷于飞，垂其翼。君子于行，三日不食。有攸往，主人有言。",
            "xiang_text": "君子于行，义不食也。"
          },
          {
            "position": "六二",
            "text": "明夷，夷于左股，用拯马壮，吉。",
            "xiang_text": "六二之吉，顺以则也。"
          },
          {
            "position": "九三",
            "text": "明夷于南狩，得其大首，不可疾，贞。",
            "xiang_text": "南狩之志，乃大得也。"
          },
          {
            "position": "六四",
            "text": "入于左腹，获明夷之心，于出门庭。",
            "xiang_text": "入于左腹，获心意也。"
          },
          {
            "position": "六五",
            "text": "箕子之明夷，利贞。",
            "xiang_text": "箕子之贞，明不可息也。"
          },
          {
            "position": "上六",
            "text": "不明，晦。初登于天，后入于地。",
            "xiang_text": "初登于天，照四国也。后入于地，失则也。"
          }
        ]
      },
      "010100": {
        "number": 39,
        "title": "蹇卦 水山蹇 坎上艮下",
        "gua_xiang": "— —\n———\n— —\n———\n— —\n— —",
        "definition": "蹇：利西南，不利东北。利见大人，贞吉。",
        "tuan": "蹇，难也，险在前也。见险而能止，知矣哉。蹇利西南，往得中也。不利东北， 其道穷也。利见大人，往有功也。当位贞吉，以正邦也。蹇之时用大矣哉。",
        "xiang": "山上有水，蹇。君子以反身修德。",
        "lines": [
          {
            "position": "初六",
            "text": "往蹇来誉。",
            "xiang_text": "往蹇来誉，宜待也。"
          },
          {
            "position": "六二",
            "text": "王臣蹇蹇，匪躬之故。",
            "xiang_text": "王臣蹇蹇，终无尤也。"
          },
          {
            "position": "九三",
            "text": "往蹇来反。",
            "xiang_text": "往蹇来反，内喜之也。"
          },
          {
            "position": "六四",
            "text": "往蹇来连。",
            "xiang_text": "往蹇来连，当位实也。"
          },
          {
            "position": "九五",
            "text": "大蹇，朋来。",
            "xiang_text": "大蹇朋来，以中节也。"
          },
          {
            "position": "上六",
            "text": "往蹇来硕，吉。利见大人。",
            "xiang_text": "往蹇来硕，志在内也。利见大人，以从贵也。"
          }
        ]
      },
      "001010": {
        "number": 40,
        "title": "解卦 雷水解 震上坎下",
        "gua_xiang": "— —\n— —\n———\n— —\n———\n— —",
        "definition": "解：利西南，无所往，其来复吉。有攸往，夙吉。",
        "tuan": "解，险以动，动而免乎险，解。解利西南，往得众也。其来复吉，乃得中也。有攸往，夙吉，往有功也。天地解而雷雨作，雷雨作而百果草木皆甲坼。解之时义大矣哉。",
        "xiang": "雷雨作，解。君子以赦过宥罪。",
        "lines": [
          {
            "position": "初六",
            "text": "无咎。",
            "xiang_text": "刚柔之际，义无咎也。"
          },
          {
            "position": "九二",
            "text": "田获三狐，得黄矢，贞吉。",
            "xiang_text": "九二贞吉，得中道也。"
          },
          {
            "position": "六三",
            "text": "负且乘，致寇至，贞吝。",
            "xiang_text": "负且乘，亦可丑也。自我致戎，又谁咎也。"
          },
          {
            "position": "九四",
            "text": "解而拇，朋至斯孚。",
            "xiang_text": "解而拇，未当位也。"
          },
          {
            "position": "六五",
            "text": "君子维有解，吉，有孚于小人。",
            "xiang_text": "君子有解，小人退也。"
          },
          {
            "position": "上六",
            "text": "公用射隼于高墉之上，获之无不利。",
            "xiang_text": "公用射隼，以解悖也。"
          }
        ]
      },
      "011111": {
        "number": 43,
        "title": "夬卦 泽天夬 兑上乾下",
        "gua_xiang": "— —\n———\n———\n———\n———\n———",
        "definition": "夬：扬于王庭。孚号有厉。告自邑，不利即戎，利有攸往。",
        "tuan": "夬，决也，刚决柔也。健而说，决而和。扬于王庭，柔乘五刚也。孚号有厉， 其危乃光也。告自邑，不利即戎，所尚乃穷也。利有攸往，刚长乃终也。",
        "xiang": "泽上于天，夬。君子以施禄及下，居德则忌。",
        "lines": [
          {
            "position": "初九",
            "text": "壮于前趾，往不胜为吝。",
            "xiang_text": "不胜而往，咎也。"
          },
          {
            "position": "九二",
            "text": "惕号，莫夜有戎，勿恤。",
            "xiang_text": "有戎勿恤，得中道也。"
          },
          {
            "position": "九三",
            "text": "壮于頄，有凶。君子夬夬独行，遇雨若濡，有愠无咎。",
            "xiang_text": "君子夬夬，终无咎也。"
          },
          {
            "position": "九四",
            "text": "臀无肤，其行次且。牵羊悔亡，闻言不信。",
            "xiang_text": "其行次且，位不当也。闻言不信，聪不明也。"
          },
          {
            "position": "九五",
            "text": "苋陆夬夬，中行无咎。",
            "xiang_text": "中行无咎，中未光也。"
          },
          {
            "position": "上六",
            "text": "无号，终有凶。",
            "xiang_text": "无号之凶，终不可长也。"
          }
        ]
      },
      "011000": {
        "number": 45,
        "title": "萃卦 泽地萃 兑上坤下",
        "gua_xiang": "— —\n———\n———\n— —\n— —\n— —",
        "definition": "萃：亨。王假有庙。利见大人，亨，利贞。用大牲吉，利有攸往。",
        "tuan": "萃，聚也。顺以说，刚中而应，故聚也。王假有庙，致孝享也。利见大人亨，聚以正也。用大牲吉，利有攸往，顺天命也。观其所聚，而天地万物之情可见矣。",
        "xiang": "泽上于地，萃。君子以除戎器，戒不虞。",
        "lines": [
          {
            "position": "初六",
            "text": "有孚不终，乃乱乃萃。若号，一握为笑。勿恤，往无咎。",
            "xiang_text": "乃乱乃萃，其志乱也。"
          },
          {
            "position": "六二",
            "text": "引吉，无咎，孚乃利用禴。",
            "xiang_text": "引吉无咎，中未变也。"
          },
          {
            "position": "六三",
            "text": "萃如，嗟如，无攸利。往无咎，小吝。",
            "xiang_text": "往无咎，上巽也。"
          },
          {
            "position": "九四",
            "text": "大吉，无咎。",
            "xiang_text": "大吉无咎，位不当也。"
          },
          {
            "position": "九五",
            "text": "萃有位，无咎。匪孚，元永贞，悔亡。",
            "xiang_text": "萃有位，志未光也。"
          },
          {
            "position": "上六",
            "text": "赍咨涕洟，无咎。",
            "xiang_text": "赍咨涕洟，未安上也。"
          }
        ]
      },
      "000110": {
        "number": 46,
        "title": "升卦 地风升 坤上巽下",
        "gua_xiang": "— —\n— —\n— —\n———\n———\n— —",
        "definition": "升：元亨，用见大人，勿恤，南征吉。",
        "tuan": "柔以时升，巽而顺，刚中而应，是以大亨。用见大人，勿恤，有庆也。南征吉， 志行也。",
        "xiang": "地中生木，升。君子以顺德，积小以高大。",
        "lines": [
          {
            "position": "初六",
            "text": "允升，大吉。",
            "xiang_text": "允升大吉，上合志也。"
          },
          {
            "position": "九二",
            "text": "孚乃利用禴，无咎。",
            "xiang_text": "九二之孚，有喜也。"
          },
          {
            "position": "九三",
            "text": "升虚邑。",
            "xiang_text": "升虚邑，无所疑也。"
          },
          {
            "position": "六四",
            "text": "王用亨于岐山，吉，无咎。",
            "xiang_text": "王用亨于岐山，顺事也。"
          },
          {
            "position": "六五",
            "text": "贞吉，升阶。",
            "xiang_text": "贞吉升阶，大得志也。"
          },
          {
            "position": "上六",
            "text": "冥升，利于不息之贞。",
            "xiang_text": "冥升在上，消不富也。"
          }
        ]
      },
      "011010": {
        "number": 47,
        "title": "困卦 泽水困 兑上坎下",
        "gua_xiang": "— —\n———\n———\n— —\n———\n— —",
        "definition": "困：亨，贞，大人吉，无咎。有言不信。",
        "tuan": "困，刚掩也。险以说，困而不失其所，亨，其唯君子乎。贞，大人吉，以刚中也。 有言不信，尚口乃穷也。",
        "xiang": "泽无水，困。君子以致命遂志。",
        "lines": [
          {
            "position": "初六",
            "text": "臀困于株木，入于幽谷，三岁不觌。",
            "xiang_text": "入于幽谷，幽不明也。"
          },
          {
            "position": "九二",
            "text": "困于酒食，朱绂方来，利用亨祀。征凶，无咎。",
            "xiang_text": "困于酒食，中有庆也。"
          },
          {
            "position": "六三",
            "text": "困于石，据于蒺藜，入于其宫，不见其妻，凶。",
            "xiang_text": "据于蒺藜，乘刚也。入于其宫，不见其妻，不祥也。"
          },
          {
            "position": "九四",
            "text": "来徐徐，困于金车，吝，有终。",
            "xiang_text": "来徐徐，志在下也。虽不当位，有与也。"
          },
          {
            "position": "九五",
            "text": "劓刖，困于赤绂，乃徐有说，利用祭祀。",
            "xiang_text": "劓刖，志未得也。乃徐有说，以 中直也。利用祭祀，受福也。"
          },
          {
            "position": "上六",
            "text": "困于葛藟，于臲卼，曰动悔。有悔，征吉。",
            "xiang_text": "困于葛藟，未当也。 动悔有悔，吉行也。"
          }
        ]
      },
      "010110": {
        "number": 48,
        "title": "井卦 水风井 坎上巽下",
        "gua_xiang": "— —\n———\n— —\n———\n———\n— —",
        "definition": "井：改邑不改井，无丧无得。往来井井。汔至亦未繘井，羸其瓶，凶。",
        "tuan": "巽乎水而上水，井。井养而不穷也。改邑不改井，乃以刚中也。汔至亦未繘井，未有功也。羸其瓶，是以凶也。",
        "xiang": "木上有水，井。君子以劳民劝相。",
        "lines": [
          {
            "position": "初六",
            "text": "井泥不食，旧井无禽。",

    const button = document.getElementById('randomButton');
    const app = document.querySelector('.card');
    const controls = document.getElementById('controls');
    const backButton = document.getElementById('backButton');
    const questionInput = document.getElementById('questionInput');
    const result = document.getElementById('result');
    let isResultVisible = false;
    let lastShakeTime = 0;
    let shakeDetectionReady = false;

    result.innerHTML = `<div class="info-item"><strong>准备好了</strong><span>点击按钮或摇晃手机，随机摇出一卦。</span></div>`;

        function getTextCodeSum(text) {
            let sum = 0;

            for (let i = 0; i < text.length; i++) {
                sum += text.charCodeAt(i);
            }

            return sum;
        }

        function createSeededRandom(seed) {
            let state = seed >>> 0;

            return function seededRandom() {
                state = (state * 1664525 + 1013904223) >>> 0;
                return state / 4294967296;
            };
        }

        function generateHexagram(seed) {
            let binary = '';
            const randomNumbers = [];
            const seededRandom = createSeededRandom(seed);

            for (let i = 0; i < 6; i++) {
                const num = Math.floor(seededRandom() * 4); // 0 to 3
                randomNumbers.push(num);
                binary += (num % 2).toString();
            }

            return {
                binaryKey: binary,
                randomNumbers
            };
        }

        function getChangedBinaryKey(randomNumbers) {
            return randomNumbers
                .map(num => {
                    const changedNum = num > 1 ? num - 1 : num;
                    return (changedNum % 2).toString();
                })
                .join('');
        }

        function renderGuaXiang(binaryKey) {
            return binaryKey
                .split('')
                .map(bit => {
                    if (bit === '1') {
                        return `<div class="gua-line solid"><span class="gua-segment"></span></div>`;
                    }

                    return `
                        <div class="gua-line broken">
                            <span class="gua-segment"></span>
                            <span class="gua-segment"></span>
                        </div>
                    `;
                })
                .join('');
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function getGuaName(item) {
            if (!item) {
                return '未找到对应卦象';
            }

            return `第 ${item.number} 卦 ${item.title}`;
        }

        function getCopyPrompt(question, item, changedItem) {
            const trimmedQuestion = question.trim();
            const questionText = trimmedQuestion ? `我想问的问题是${trimmedQuestion}，` : '';

            return `${questionText}得到的卦是${getGuaName(item)}，变卦是${getGuaName(changedItem)}，帮我解卦。`;
        }

        function getBaguaHtml(item, binaryKey, sectionTitle, randomNumbers = []) {
            if (!item) {
                return `
                    <h2 class="section-title">${sectionTitle}</h2>
                    <div class="info-item"><strong>未找到数据</strong><span>当前卦象没有对应信息。</span></div>
                `;
            }

            let linesHtml = '';
            if (Array.isArray(item.lines)) {
                linesHtml = item.lines.map((line, index) => `
                    <div class="line-block">
                        <span><strong class="${randomNumbers[index] > 1 ? 'changing-line' : ''}">${line.position}</strong></span>
                        <span>${line.text}</span>
                        <span class="muted">${line.xiang_text}</span>
                    </div>
                `).join('');
            }

            return `
                <h2 class="section-title">${sectionTitle}</h2>
                <div class="info-item">
                    <strong>第 ${item.number} 卦</strong>
                    <span>${item.title}</span>
                    <div class="gua-xiang">${renderGuaXiang(binaryKey)}</div>

                    <strong>卦辞</strong>
                    <span>${item.definition}</span>

                    <strong>《象》曰</strong>
                    <span>${item.xiang}</span>
                </div>
                ${linesHtml}
            `;
        }

        function renderBagua(item, binaryKey, randomNumbers = [], question = '') {
            const changedBinaryKey = getChangedBinaryKey(randomNumbers);
            const changedItem = baguaData[changedBinaryKey];
            const changedNote = changedBinaryKey === binaryKey
                ? `<div class="info-item"><strong>变卦说明</strong><span>没有随机数大于 1，变卦与本卦相同。</span></div>`
                : '';
            const copyPrompt = getCopyPrompt(question, item, changedItem);
            isResultVisible = true;
            app.classList.add('result-mode');
            controls.classList.add('hidden');
            backButton.classList.remove('hidden');

            result.innerHTML = `
                ${getBaguaHtml(item, binaryKey, '本卦', randomNumbers)}
                ${changedNote}
                ${getBaguaHtml(changedItem, changedBinaryKey, '变卦')}
                <div class="info-item">

                </div>
            `;
        }

        function drawHexagram() {
            const question = questionInput.value;
            const seed = Date.now() + getTextCodeSum(question);
            const { binaryKey, randomNumbers } = generateHexagram(seed);
            const changedBinaryKey = getChangedBinaryKey(randomNumbers);
            console.log('随机种子:', seed, '生成的卦象键值:', binaryKey, '变卦键值:', changedBinaryKey, '随机数:', randomNumbers);
            const item = baguaData[binaryKey];
            renderBagua(item, binaryKey, randomNumbers, question);

        async function enableShakeDetection() {
            if (shakeDetectionReady || !window.DeviceMotionEvent) {
                return;
            }

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission !== 'granted') {
                        return;
                    }
                } catch (error) {
                    console.warn('无法启用摇晃检测:', error);
                    return;
                }
            }

            window.addEventListener('devicemotion', handleDeviceMotion);
            shakeDetectionReady = true;
        }

        function handleDeviceMotion(event) {
            if (isResultVisible) {
                return;
            }

            const acceleration = event.accelerationIncludingGravity;
            if (!acceleration) {
                return;
            }

            const x = acceleration.x || 0;
            const y = acceleration.y || 0;
            const z = acceleration.z || 0;
            const strength = Math.sqrt((x * x) + (y * y) + (z * z));
            const now = Date.now();

            if (strength > 24 && now - lastShakeTime > 1200) {
                lastShakeTime = now;
                drawHexagram();
            }
        }

        button.addEventListener('click', () => {
            enableShakeDetection();
            drawHexagram();
        });

        backButton.addEventListener('click', () => {
            isResultVisible = false;
            app.classList.remove('result-mode');
            backButton.classList.add('hidden');
            controls.classList.remove('hidden');
            result.innerHTML = `<div class="info-item"><strong>准备好了</strong><span>点击按钮或摇晃手机，随机摇出一卦。</span></div>`;
        });

        window.addEventListener('pointerdown', () => {
            enableShakeDetection();
        }, { once: true });

        if (!window.DeviceMotionEvent) {
            console.log('当前设备不支持摇晃检测。');
        } else {
            enableShakeDetection();
        }

        result.addEventListener('focusin', event => {
            if (event.target.classList.contains('copy-textarea')) {
                event.target.select();
            }
        });
    </script>
</body>
</html>
